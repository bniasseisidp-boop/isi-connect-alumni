services:
  # --- Backend Laravel API ---
  - type: web
    name: isi-connect-api
    env: php
    plan: free
    rootDir: isi_connect_api
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: php artisan migrate --force && php artisan db:seed --class=UserSeeder --force && vendor/bin/heroku-php-apache2 public/
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: isi-connect-db
          property: connectionString
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_USERNAME
        value: multibrainmusic1@gmail.com
      - key: MAIL_PASSWORD
        value: usljakmqlwdwxcsb
      - key: MAIL_ENCRYPTION
        value: ssl
      - key: MAIL_FROM_ADDRESS
        value: multibrainmusic1@gmail.com
      - key: MAIL_FROM_NAME
        value: "ISI Suptech Alumni"

  # --- Frontend Vue/Vite ---
  - type: static_site
    name: isi-connect-alumni
    env: static
    plan: free
    rootDir: isi_connect_frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: isi-connect-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: isi-connect-db
    plan: free
    databaseName: isi_connect_db
    user: isi_user
