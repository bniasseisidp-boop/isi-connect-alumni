services:
  # --- Backend Laravel API ---
  - type: web
    name: isi-connect-api
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: isi_connect_api
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://isi-connect-api.onrender.com
      - key: FRONTEND_URL
        value: https://isi-connect-alumni.onrender.com
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: base64:wepk8jPh9p5jYgVh2G191De7H4qpm+pWLPxL/AW7+Do=
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: isi-connect-db
          property: connectionString
      - key: MAIL_MAILER
        value: smtp
      - key: QUEUE_CONNECTION
        value: sync
      - key: MAIL_HOST
        value: smtp-relay.brevo.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        value: a732e3001@smtp-brevo.com
      - key: MAIL_PASSWORD
        value: "xsmtpsib-2ed30150147b967a4261b5be6e12582d65d61a03ccec9a99533bcb9d6ed654f6-15m2YATMPJN6RJhb"
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: multibrainmusic1@gmail.com
      - key: MAIL_FROM_NAME
        value: "ISI Suptech Alumni"

  # --- Frontend Vue/Vite ---
  - type: web
    name: isi-connect-alumni
    runtime: static
    rootDir: isi_connect_frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://isi-connect-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: isi-connect-db
    plan: free
    databaseName: isi_connect_db
    user: isi_user
