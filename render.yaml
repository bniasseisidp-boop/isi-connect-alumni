services:
  # --- Backend Laravel API ---
  - type: web
    name: isi-connect-api
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: isi_connect_api
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://isi-connect-api.onrender.com
      - key: PORT
        value: "80"
      - key: FRONTEND_URL
        value: https://isi-connect-alumni.onrender.com
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: base64:wepk8jPh9p5jYgVh2G191De7H4qpm+pWLPxL/AW7+Do=
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: isi-connect-db
          property: connectionString
      - key: MAIL_MAILER
        value: resend
      - key: QUEUE_CONNECTION
        value: sync
      - key: RESEND_KEY
        value: re_f6L28Ady_KB4muuxDhY7fiB5R36rMHboo
      - key: MAIL_FROM_ADDRESS
        value: multibrainmusic1@gmail.com
      - key: MAIL_FROM_NAME
        value: "ISI Suptech Alumni"

  # --- Frontend Vue/Vite ---
  - type: static
    name: isi-connect-alumni
    rootDir: isi_connect_frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://isi-connect-api.onrender.com
      - key: VITE_APP_NAME
        value: "ISI Suptech Alumni"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: isi-connect-db
    plan: free
    databaseName: isi_connect_db
    user: isi_user
