name: Deploy Alumni ISI Connect

on:
  push:
    branches:
      - master

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend Vue SPA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: isi_connect_frontend/package-lock.json

      - name: Installation des dependances
        working-directory: isi_connect_frontend
        run: npm ci

      - name: Build de la SPA Vue (production)
        working-directory: isi_connect_frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Deploiement FTP vers alumni.isisuptech.com
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: isi_connect_frontend/dist/
          server-dir: /public_html/alumni/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

  deploy-api:
    name: Deploy API Laravel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, curl, json, tokenizer, xml, zip
          coverage: none

      - name: Installation Composer production
        working-directory: isi_connect_api
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Deploiement FTP vers apialumni.isisuptech.com
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: isi_connect_api/
          server-dir: /public_html/apialumni/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/tests/**
            **/push_result.txt
            **/columns.txt
            **/start_backend.bat
            **/render-build.sh
            **/composer.phar
            **/set_admin.php
